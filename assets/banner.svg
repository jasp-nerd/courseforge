<svg width="880" height="220" viewBox="0 0 880 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="CourseForge — AI-powered Canvas course creator">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="880" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fb923c"/>
      <stop offset="1" stop-color="#e11d48"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fb923c"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <rect width="880" height="220" rx="16" fill="url(#bg)"/>

  <!-- anvil + spark motif -->
  <g transform="translate(64,58)">
    <path d="M8 62 h88 l-12 16 h-24 v14 h20 l6 12 h-68 l6 -12 h20 v-14 h-24 z" fill="#334155"/>
    <path d="M0 40 h104 l-8 22 h-88 z" fill="#475569"/>
    <!-- spark/flame -->
    <path d="M52 0 c10 12 22 18 22 32 a22 22 0 1 1 -44 0 c0 -14 12 -20 22 -32 z" fill="url(#flame)"/>
    <circle cx="52" cy="34" r="8" fill="#fef3c7"/>
  </g>

  <text x="208" y="102" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="56" font-weight="800" fill="#f8fafc" letter-spacing="-1">Course<tspan fill="#fb923c">Forge</tspan></text>
  <text x="210" y="140" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="21" fill="#cbd5e1">From syllabus to a real Canvas course — MCP server, agent skills &amp; IMSCC toolkit</text>

  <rect x="210" y="160" width="420" height="4" rx="2" fill="url(#accent)"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#94a3b8">
    <text x="210" y="192">npx -y courseforge-mcp</text>
    <text x="470" y="192" fill="#64748b">·  Apache-2.0  ·  TypeScript</text>
  </g>
</svg>
